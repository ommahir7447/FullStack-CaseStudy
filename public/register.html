<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new student account to register for courses">
  <title>Register — Student Course Registration</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🎓</div>
        <h1>Create Account</h1>
        <p class="auth-subtitle">Register to start enrolling in courses</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required autocomplete="name">
          <p class="form-error" id="nameError"></p>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@university.edu" required autocomplete="email">
          <p class="form-error" id="emailError"></p>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required autocomplete="new-password">
          <p class="form-error" id="passwordError"></p>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
          <p class="form-error" id="confirmPasswordError"></p>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
