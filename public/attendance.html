<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your attendance for enrolled courses">
  <title>Attendance — Student Course Registration</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-brand">
        <div class="logo-icon">🎓</div>
        <span>CourseReg</span>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      <ul class="navbar-links" id="navLinks">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="my-enrollments.html">My Enrollments</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="attendance.html" class="active">Attendance</a></li>
        <li><a href="marks.html">Marks</a></li>
      </ul>
      <div class="navbar-user">
        <span class="user-name" id="userName"></span>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="page-wrapper">
      <div class="page-header">
        <h1>📊 Attendance Tracker</h1>
        <p>View your attendance records for each enrolled course.</p>
      </div>

      <div id="alert" class="alert"></div>

      <!-- Seed button -->
      <div class="seed-actions" id="seedActions">
        <button class="btn btn-primary btn-sm" id="seedAttendanceBtn" onclick="seedAttendance(this)">
          🎲 Generate Sample Attendance Data
        </button>
      </div>

      <!-- Loading -->
      <div id="loadingState" class="loading-state">
        <div class="spinner-lg"></div>
        <p>Loading attendance data...</p>
      </div>

      <!-- Attendance Cards -->
      <div id="attendanceContainer" class="attendance-container" style="display:none;"></div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-icon">📊</div>
        <h3>No attendance records</h3>
        <p>Attendance data will appear here once classes begin.</p>
        <a href="courses.html" class="btn btn-primary">Browse Courses</a>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/attendance.js"></script>
</body>
</html>
